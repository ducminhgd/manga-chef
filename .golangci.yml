# Manga Chef — golangci-lint configuration
# Docs: https://golangci-lint.run/usage/configuration/
# Compatible with golangci-lint v1.57.x (v1 config schema — no top-level version key)

run:
  timeout: 5m
  skip-dirs:
    - vendor
  skip-files:
    - "mock_.*\\.go$"

linters:
  disable-all: true
  enable:
    # --- Correctness ---
    - errcheck
    - govet
    - staticcheck
    - gosimple
    - unused
    - ineffassign

    # --- Style & Consistency ---
    - gofmt
    - goimports
    - misspell
    - whitespace

    # --- Bugs & Safety ---
    - bodyclose
    - contextcheck
    - noctx
    - rowserrcheck
    - sqlclosecheck
    - exhaustive

    # --- Complexity ---
    - cyclop
    - funlen
    - gocognit

    # --- Go Idioms ---
    - gocritic
    - godot
    - wrapcheck

linters-settings:
  errcheck:
    check-type-assertions: true
    check-blank: true

  goimports:
    local-prefixes: github.com/ducminhgd/manga-chef

  cyclop:
    max-complexity: 15
    skip-tests: true

  funlen:
    lines: 80
    statements: 50
    ignore-comments: true

  gocognit:
    min-complexity: 20

  gocritic:
    enabled-tags:
      - diagnostic
      - style
      - performance
    disabled-checks:
      - commentedOutCode

  godot:
    scope: toplevel
    period: true

  wrapcheck:
    ignorePackageGlobs:
      - encoding/*
      - github.com/ducminhgd/manga-chef/*

  exhaustive:
    default-signifies-exhaustive: true

  staticcheck:
    checks:
      - "all"
      - "-ST1000"
      - "-ST1020"

issues:
  max-issues-per-linter: 50
  max-same-issues: 10
  new: false

  exclude-rules:
    - path: "_test\\.go$"
      linters:
        - funlen
        - gocognit
        - wrapcheck
        - godot

    - path: "^cmd/"
      linters:
        - wrapcheck
        - cyclop

    - linters:
        - errcheck
      text: "Error return value of `.*\\.Close\\(\\)` is not checked"

    - linters:
        - gocritic
      text: "namedReturn"