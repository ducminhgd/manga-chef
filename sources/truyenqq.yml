# TruyenQQ — truyenqqno.com
#
# Usage:
#   manga-chef download --source truyenqq --url https://truyenqqno.com/truyen-tranh/<slug>
#
# Sample manga:
#   Dấu Ấn Rồng Thiêng - Dragon Quest (349 chapters)
#   https://truyenqqno.com/truyen-tranh/dau-an-rong-thieng-236
#
# URL patterns:
#   Manga page : https://truyenqqno.com/truyen-tranh/<slug>
#   Chapter    : https://truyenqqno.com/truyen-tranh/<slug>-chap-<n>.html
#
# Known behaviour:
#   - Chapter list is ordered newest-first; the scraper reverses it.
#   - Images are lazy-loaded: the real URL is in data-src, not src.
#   - The CDN requires a matching Referer header; requests without it return 403.
#   - Rate limiting at 500 ms is recommended to avoid temporary IP bans.

sources:
  - name: "TruyenQQ"
    code: "truyenqq"
    base_url: "https://truyenqqno.com"
    scraper: "truyenqq"
    rate_limit_ms: 500
    retries: 3
    timeout_s: 30
    headers:
      Referer: "https://truyenqqno.com"
      User-Agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36"
      sec-fetch-site: "cross-site"
    # Only download images inside `<div class="page-chapter">` containers.
    selectors:
      chapter_list: "ul.list-chapter li a"
      chapter_number: "attr:href"
      image_list: "div.page-chapter"
      image_url: "attr:data-original"
