# Manga Chef — mockery configuration
# Docs: https://vektra.github.io/mockery/latest/configuration/
# Minimum mockery version: v2.40
#
# Usage:
#   go generate ./...          — regenerate all mocks
#   mockery                    — run directly from project root
#
# Generated mocks are committed to the repository so that:
#   - CI does not require mockery to be installed
#   - reviewers can see exactly what changed when an interface changes
#
# Mock files follow the naming convention: mock_<InterfaceName>.go
# and are placed alongside the package they mock (not in a separate mocks/ dir).

version: "2"

# Global defaults applied to all packages unless overridden.
with-expecter: true        # Generate .EXPECT() helper (type-safe expectation setup)
mockname: "Mock{{.InterfaceName}}"
outpkg: "{{.PackageName}}"
filename: "mock_{{.InterfaceName | snakecase}}.go"
inpackage: true            # Place mock in the same package as the interface
                           # Keeps test helpers co-located and avoids import cycles

packages:
  # --- Scraper interface ---
  # Used by: downloader, CLI integration tests
  github.com/ducminhgd/manga-chef/internal/scraper:
    interfaces:
      ScraperInterface:
        config:
          mockname: "MockScraper"
          filename: "mock_scraper.go"

  # --- HTTP client interface ---
  # Used by: all scrapers (TruyenQQ, generic) for test injection
  github.com/ducminhgd/manga-chef/internal/scraper:
    interfaces:
      HTTPClient:
        config:
          mockname: "MockHTTPClient"
          filename: "mock_http_client.go"

  # --- Downloader interface ---
  # Used by: CLI layer tests (verifies correct args are passed)
  github.com/ducminhgd/manga-chef/internal/downloader:
    interfaces:
      Downloader:
        config:
          mockname: "MockDownloader"
          filename: "mock_downloader.go"

  # --- Converter interface ---
  # Used by: CLI layer tests (verifies correct format/path args)
  github.com/ducminhgd/manga-chef/internal/converter:
    interfaces:
      ConverterInterface:
        config:
          mockname: "MockConverter"
          filename: "mock_converter.go"

  # --- Progress reporter interface ---
  # Used by: downloader tests (verify progress callbacks are invoked)
  github.com/ducminhgd/manga-chef/internal/downloader:
    interfaces:
      ProgressReporter:
        config:
          mockname: "MockProgressReporter"
          filename: "mock_progress_reporter.go"