name: Build

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
    paths-ignore:
      - "**.md"
      - "docs/**"
  pull_request:
    branches:
      - main
    paths-ignore:
      - "**.md"
      - "docs/**"

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.22"
  BINARY_NAME: manga-chef

jobs:
  build:
    name: Build / ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Linux ──────────────────────────────────────────────────────────
          - goos: linux
            goarch: amd64
            runner: ubuntu-latest
            asset_suffix: linux-amd64
            native: true    # ubuntu-latest is x86_64 — can run this binary

          - goos: linux
            goarch: arm64
            runner: ubuntu-latest
            asset_suffix: linux-arm64
            native: false   # cross-compiled on amd64 runner — cannot execute

          # ── macOS ──────────────────────────────────────────────────────────
          - goos: darwin
            goarch: amd64
            runner: macos-latest
            asset_suffix: darwin-amd64
            native: false   # macos-latest runners are Apple Silicon (arm64)

          - goos: darwin
            goarch: arm64
            runner: macos-latest
            asset_suffix: darwin-arm64
            native: true    # macos-latest runners are Apple Silicon (arm64)

          # ── Windows ────────────────────────────────────────────────────────
          - goos: windows
            goarch: amd64
            runner: windows-latest
            asset_suffix: windows-amd64
            binary_ext: ".exe"
            native: false   # skipped separately via goos check — shell differences

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          # cache: true requires go.sum to exist. setup-go caches the module
          # download cache; combined with the explicit download step below this
          # means subsequent runs skip the network entirely.
          cache: true

      - name: Download dependencies
        # Explicit download step ensures modules are cached by setup-go before
        # go build runs. Without this, go build hits proxy.golang.org at build
        # time which can fail on slow/restricted networks.
        # Also ensures go.sum is used to verify integrity before building.
        run: go mod download

      - name: Resolve version info
        id: version
        shell: bash
        run: |
          VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo "dev")
          COMMIT=$(git rev-parse --short HEAD 2>/dev/null || echo "unknown")
          BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "commit=${COMMIT}"   >> $GITHUB_OUTPUT
          echo "date=${BUILD_DATE}" >> $GITHUB_OUTPUT

      - name: Build binary
        shell: bash
        env:
          GOOS:        ${{ matrix.goos }}
          GOARCH:      ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          BINARY="${{ env.BINARY_NAME }}-${{ matrix.asset_suffix }}${{ matrix.binary_ext }}"
          mkdir -p dist
          go build \
            -trimpath \
            -ldflags="-s -w \
              -X github.com/ducminhgd/manga-chef/internal/version.Version=${{ steps.version.outputs.version }} \
              -X github.com/ducminhgd/manga-chef/internal/version.Commit=${{ steps.version.outputs.commit }} \
              -X github.com/ducminhgd/manga-chef/internal/version.BuildDate=${{ steps.version.outputs.date }}" \
            -o "dist/${BINARY}" \
            ./cmd/manga-chef
          echo "Built: dist/${BINARY}"
          ls -lh dist/

      - name: Smoke test binary
        # Only run on natively-executable targets.
        # Cross-compiled binaries (e.g. linux/arm64 built on amd64, darwin/amd64
        # built on Apple Silicon) will fail with "Exec format error" if run here.
        # Windows is excluded via the goos check — shell quoting differences make
        # the .exe smoke test unreliable across runners.
        if: matrix.native && matrix.goos != 'windows'
        run: |
          ./dist/${{ env.BINARY_NAME }}-${{ matrix.asset_suffix }} --version
          ./dist/${{ env.BINARY_NAME }}-${{ matrix.asset_suffix }} --help

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}-${{ matrix.asset_suffix }}
          path: dist/
          retention-days: 7

  # ── Release ──────────────────────────────────────────────────────────────────
  release:
    name: Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all platform artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          pattern: ${{ env.BINARY_NAME }}-*
          merge-multiple: false

      - name: Flatten dist directory
        run: |
          find dist/ -type f -exec mv {} dist/ \;
          find dist/ -type d -empty -delete
          ls -lh dist/

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*