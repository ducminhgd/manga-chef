name: CI

on:
  push:
    branches:
      - main
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "sources/README.md"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/PULL_REQUEST_TEMPLATE.md"
  pull_request:
    branches:
      - main
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "sources/README.md"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/PULL_REQUEST_TEMPLATE.md"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.22"
  GOLANGCI_LINT_VERSION: "v1.57.2"

jobs:
  # ── Job 1: Format Check ──────────────────────────────────────────────────────
  fmt:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Check gofmt
        run: bash scripts/check-fmt.sh

  # ── Job 2: Lint ──────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: fmt
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: ${{ env.GOLANGCI_LINT_VERSION }}
          args: --config=.golangci.yml --timeout=5m

  # ── Job 3: Test ──────────────────────────────────────────────────────────────
  test:
    name: Test (race detector)
    runs-on: ubuntu-latest
    needs: fmt
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Verify go.sum is up to date
        run: go mod verify

      - name: Run tests with race detector
        # Run all packages but collect coverage only for packages that have
        # test files. Packages without tests (cmd/manga-chef, pkg/sources,
        # internal/version) cause "no such tool covdata" errors in Go 1.20+
        # when -coverprofile is used with ./... because the coverage binary
        # merge tool is not available for packages with zero test binaries.
        run: |
          # First pass: run all tests with race detector (no coverage).
          # This ensures cmd/, pkg/, and other test-less packages still compile.
          go test -race -count=1 -timeout=120s ./...

          # Second pass: coverage only for packages that have _test.go files.
          # go list -f '{{if .TestGoFiles}}{{.ImportPath}}{{end}}' filters these out.
          TEST_PKGS=$(go list -f '{{if .TestGoFiles}}{{.ImportPath}}{{end}}' ./... | tr '\n' ' ')
          go test \
            -count=1 \
            -timeout=120s \
            -coverprofile=coverage.out \
            -covermode=atomic \
            $TEST_PKGS

      - name: Generate coverage report
        run: go tool cover -func=coverage.out

      - name: Post coverage summary to job summary
        run: |
          echo "## 📊 Test Coverage" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          go tool cover -func=coverage.out >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.out
          retention-days: 7